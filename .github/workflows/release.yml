name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # Release 2: each platform ships a single combined archive
          # containing both `memory` and `memory-dream`. The asset name
          # embeds the tag so the updater + install scripts can resolve
          # a specific release deterministically.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            memory_bin: memory.exe
            dream_bin: memory-dream.exe
            archive_suffix: windows-x86_64.zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            memory_bin: memory
            dream_bin: memory-dream
            archive_suffix: linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            memory_bin: memory
            dream_bin: memory-dream
            archive_suffix: linux-aarch64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            memory_bin: memory
            dream_bin: memory-dream
            archive_suffix: macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            memory_bin: memory
            dream_bin: memory-dream
            archive_suffix: macos-aarch64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Workspace build produces both binaries under
      # target/<triple>/release/{memory,memory-dream}.
      - name: Build workspace
        run: cargo build --release --target ${{ matrix.target }} --workspace
        env:
          AGENT_MEMORY_VERSION: ${{ github.ref_name }}

      - name: Compute archive name
        id: archive
        shell: bash
        run: |
          echo "name=agent-memory-${{ matrix.archive_suffix }}" >> $GITHUB_OUTPUT

      - name: Package (Windows — combined .zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "target/${{ matrix.target }}/release"
          Compress-Archive -Path "$src/${{ matrix.memory_bin }}","$src/${{ matrix.dream_bin }}" `
            -DestinationPath "${{ steps.archive.outputs.name }}"

      - name: Package (Unix — combined .tar.gz)
        if: runner.os != 'Windows'
        run: |
          tar czf ${{ steps.archive.outputs.name }} \
            -C target/${{ matrix.target }}/release \
            ${{ matrix.memory_bin }} ${{ matrix.dream_bin }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.archive.outputs.name }}
          path: ${{ steps.archive.outputs.name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
